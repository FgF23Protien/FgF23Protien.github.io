<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Password: Brady</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: black;
      color: white;
      overflow: hidden;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .background-image {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: url('https://static3.srcdn.com/wordpress/wp-content/uploads/2019/02/District-9-Sequel-District-10-Logo.jpg') no-repeat center center fixed;
      background-size: cover;
      opacity: 0;
      animation: fadeInBg 1.5s ease forwards;
      z-index: 0;
    }

    @keyframes fadeInBg {
      to {
        opacity: 1;
      }
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
      }
    }

    .fade-out {
      animation: fadeOut 1s forwards;
    }

    .container {
      position: relative;
      z-index: 1;
      background-color: rgba(0, 0, 0, 0.75);
      padding: 40px 60px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 0 20px #ffffff55;
      opacity: 0;
      animation: fadeInContent 1.5s ease forwards 0.5s;
      max-width: 320px;
      width: 100%;
    }

    @keyframes fadeInContent {
      to {
        opacity: 1;
      }
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 25px;
      text-shadow: 0 0 10px white, 0 0 20px white;
    }

    input[type="password"] {
      padding: 12px;
      width: 100%;
      border: 2px solid white;
      border-radius: 8px;
      background: transparent;
      color: white;
      font-size: 1.1rem;
      text-align: center;
      outline: none;
      box-sizing: border-box;
    }

    #hiddenMessage {
      margin-top: 20px;
      font-size: 1.2rem;
      color: #0f0;
      display: none;
      text-shadow: 0 0 5px lime;
    }

    #errorMessage {
      color: red;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="background-image" id="bg"></div>

  <div class="container" id="container">
    <h1>Enter Password</h1>
    <input
      type="password"
      id="passwordInput"
      placeholder="Password"
      autocomplete="off"
      autofocus
      onkeydown="if(event.key === 'Enter') checkPassword()"
    />
    <div id="hiddenMessage">✔ Access Granted. Welcom to TASS. Redirecting...</div>
    <div id="errorMessage">✖ Incorrect password. Hint: Look up at the tab</div>
  </div>

<script>
  function checkPassword() {
    const input = document.getElementById('passwordInput').value;
    const message = document.getElementById('hiddenMessage');
    const error = document.getElementById('errorMessage');
    const container = document.getElementById('container');
    const bg = document.getElementById('bg');

    if (input === "Brady") {
      message.style.display = "block";
      error.style.display = "none";

      setTimeout(() => {
        container.classList.add('fade-out');
        bg.classList.add('fade-out');
      }, 500); // Show message first

      setTimeout(() => {
        window.location.href = "main.html";
      }, 1500); // Redirect after fade-out
    } else {
      message.style.display = "none";
      error.style.display = "block";
    }
  }
</script>

</body>
</html>
