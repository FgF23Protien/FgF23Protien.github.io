<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>War RP Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }
    #map {
      width: 100%;
      height: 100%;
    }
    .country-popup {
      font-family: sans-serif;
      font-size: 14px;
    }
    .country-popup h3 {
      margin: 0 0 4px 0;
      font-size: 16px;
    }
    .country-popup p {
      margin: 2px 0;
    }
  </style>
</head>
<body>
<div id="map"></div>

<!-- Leaflet JS -->
<script
  src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
  crossorigin=""
></script>

<script>
  // === 1. BASIC MAP SETUP (IMAGE-BASED) ===
  // Set these to your image's pixel size
  const imageWidth = 4096;   // change to your map image width
  const imageHeight = 2048;  // change to your map image height

  // Create map with simple CRS (pixel coordinates)
  const map = L.map('map', {
    crs: L.CRS.Simple,
    minZoom: -2,
    maxZoom: 4
  });

  // Define image bounds in "map units" (0,0) to (width, height)
  const bounds = [[0, 0], [imageHeight, imageWidth]];

  // Add your map image here (put the image in same folder and update filename)
  const image = L.imageOverlay('romantass7redux.png', bounds).addTo(map);

  // Fit map to image
  map.fitBounds(bounds);

  // === 2. COUNTRY DATA (EXAMPLE) ===
  // Coordinates are in image pixel space: [y, x]
  // You’ll want to tweak these to match your map regions.
  const countries = [
    {
      name: 'Roman Empire',
      stats: {
        population: '45M',
        armies: 12,
        economy: 'Strong',
        capital: 'Roma'
      },
      // Rough polygon example (rectangle-ish)
      polygon: [
        [1200, 600],
        [1200, 2000],
        [1700, 2000],
        [1700, 600]
      ],
      color: '#e74c3c'
    },
    {
      name: 'Dominion of the Franks',
      stats: {
        population: '8M',
        armies: 5,
        economy: 'Growing',
        capital: 'Lutetia'
      },
      polygon: [
        [800, 400],
        [800, 1200],
        [1100, 1200],
        [1100, 400]
      ],
      color: '#3498db'
    },
    {
      name: 'Germanic Tribes',
      stats: {
        population: '6M',
        armies: 4,
        economy: 'Moderate',
        capital: 'None (tribal)'
      },
      polygon: [
        [600, 1200],
        [600, 2200],
        [1100, 2200],
        [1100, 1200]
      ],
      color: '#2ecc71'
    }
  ];

  // === 3. ADD COUNTRIES TO MAP ===
  countries.forEach(country => {
    const layer = L.polygon(country.polygon, {
      color: country.color,
      weight: 2,
      fillColor: country.color,
      fillOpacity: 0.35
    }).addTo(map);

    const popupHtml = `
      <div class="country-popup">
        <h3>${country.name}</h3>
        <p><strong>Population:</strong> ${country.stats.population}</p>
        <p><strong>Armies:</strong> ${country.stats.armies}</p>
        <p><strong>Economy:</strong> ${country.stats.economy}</p>
        <p><strong>Capital:</strong> ${country.stats.capital}</p>
      </div>
    `;

    layer.bindPopup(popupHtml);

    // Optional: highlight on hover
    layer.on('mouseover', function () {
      this.setStyle({ weight: 3, fillOpacity: 0.5 });
    });
    layer.on('mouseout', function () {
      this.setStyle({ weight: 2, fillOpacity: 0.35 });
    });
  });

  // === 4. OPTIONAL: CLICK HANDLER FOR DEBUGGING COORDS ===
  // Helps you find pixel coordinates by clicking the map.
  map.on('click', function (e) {
    const point = e.latlng; // in CRS.Simple, lat = y, lng = x
    console.log('Clicked at (y, x):', point.lat.toFixed(0), point.lng.toFixed(0));
  });
</script>
</body>
</html>
